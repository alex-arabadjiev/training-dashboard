name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Run unit tests
        run: gradle test

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  appetize:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk

      - name: Upload APK to Appetize.io
        env:
          APPETIZE_API_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
        run: |
          if [ -z "$APPETIZE_API_TOKEN" ]; then
            echo "::error::APPETIZE_API_TOKEN secret is not set"
            exit 1
          fi

          APK_BASE64=$(base64 -w 0 app-debug.apk)

          HTTP_CODE=$(curl --silent --output /tmp/appetize-response.json --write-out "%{http_code}" \
            "https://api.appetize.io/v2/apps" \
            -H "Authorization: Bearer $APPETIZE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"platform\":\"android\",\"fileData\":\"data:application/vnd.android.package-archive;base64,${APK_BASE64}\",\"note\":\"PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}\"}")

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Appetize API returned HTTP $HTTP_CODE"
            cat /tmp/appetize-response.json || true
            exit 1
          fi

          RESPONSE=$(cat /tmp/appetize-response.json)

          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          if 'error' in data:
              print(f\"::error::Appetize API error: {data['error']}\")
              sys.exit(1)
          url = data.get('appVersions', [{}])[0].get('publicURL', '')
          summary = '### Appetize Preview\n'
          if url:
              summary += f'Test this build: {url}'
          else:
              summary += 'Upload complete. Check [Appetize dashboard](https://appetize.io/apps) for the build.'
          with open('$GITHUB_STEP_SUMMARY', 'a') as f:
              f.write(summary)
          print(f'Appetize URL: {url}')
          "
