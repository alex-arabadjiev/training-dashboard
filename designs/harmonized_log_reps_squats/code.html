<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log Reps - Training App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#abd600",
              "primary": "#ffffff",
              "secondary-fixed": "#9cf0ff",
              "on-primary-container": "#556d00",
              "on-tertiary-container": "#556774",
              "on-tertiary": "#21323e",
              "on-secondary-fixed-variant": "#004f58",
              "secondary-fixed-dim": "#00daf3",
              "primary-fixed": "#CCFF00",
              "surface-container-lowest": "#0e0e0e",
              "surface-container-high": "#2a2a2a",
              "on-primary": "#283500",
              "tertiary": "#ffffff",
              "error-container": "#93000a",
              "tertiary-fixed-dim": "#b6c9d8",
              "secondary-container": "#00e3fd",
              "on-surface-variant": "#c4c9ac",
              "on-secondary-fixed": "#001f24",
              "on-error": "#690005",
              "tertiary-fixed": "#d2e5f5",
              "on-tertiary-fixed": "#0b1d29",
              "surface-container": "#201f1f",
              "surface-container-low": "#1c1b1b",
              "on-tertiary-fixed-variant": "#374956",
              "surface": "#131313",
              "surface-bright": "#393939",
              "primary-container": "#CCFF00",
              "inverse-surface": "#e5e2e1",
              "tertiary-container": "#d2e5f5",
              "on-secondary-container": "#00616d",
              "secondary": "#bdf4ff",
              "on-primary-fixed": "#161e00",
              "on-secondary": "#00363d",
              "on-error-container": "#ffdad6",
              "surface-variant": "#353534",
              "surface-tint": "#abd600",
              "outline": "#8e9379",
              "on-surface": "#e5e2e1",
              "error": "#ffb4ab",
              "surface-dim": "#131313",
              "on-primary-fixed-variant": "#3c4d00"
            },
            fontFamily: {
              "headline": ["Lexend"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(45deg, #CCFF00, #c3f400);
        }
        .glass-panel {
            background: rgba(53, 53, 52, 0.6);
            backdrop-filter: blur(12px);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-surface/80 backdrop-blur-md">
<div class="flex items-center gap-4">
<button class="active:opacity-70 transition-opacity text-primary-fixed">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-headline font-bold tracking-tight uppercase text-primary-fixed">LOG REPS</h1>
</div>
</header>
<main class="pt-24 pb-32 px-6 flex flex-col items-center min-h-screen">
<!-- Kinetic Counter Section -->
<section class="relative flex flex-col items-center justify-center w-full mb-12 py-4">
<!-- Exercise Header -->
<div class="mb-6">
<h2 class="font-headline text-3xl font-black text-white uppercase tracking-tighter border-b-4 border-primary-fixed inline-block">SQUATS</h2>
</div>
<!-- Progress Ring Visualization -->
<div class="relative w-72 h-72 flex items-center justify-center">
<svg class="absolute inset-0 w-full h-full -rotate-90 transform" viewbox="0 0 100 100">
<!-- Subtle Background circle -->
<circle cx="50" cy="50" fill="transparent" r="46" stroke="rgba(255, 255, 255, 0.05)" stroke-width="4"></circle>
<!-- Progress circle -->
<circle class="drop-shadow-[0_0_12px_rgba(204,255,0,0.4)]" cx="50" cy="50" fill="transparent" r="46" stroke="#CCFF00" stroke-dasharray="289.02" stroke-dashoffset="144.51" stroke-linecap="round" stroke-width="5"></circle>
</svg>
<div class="relative z-10 flex flex-col items-center">
<div class="flex flex-col items-center">
<!-- Progress Display Harmonized with Lexend -->
<span class="font-headline text-[7rem] font-black leading-none text-white tracking-tighter drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]">14</span>
<!-- Visual accent -->
<div class="h-2 w-16 bg-primary-fixed rounded-full -mt-2 shadow-[0_0_10px_rgba(204,255,0,0.5)]"></div>
</div>
<span class="font-headline text-sm font-bold uppercase tracking-widest text-on-surface-variant mt-6">Reps completed</span>
<!-- Integrated Goal -->
<div class="mt-4 px-6 py-2 bg-surface-container-high rounded-full border border-white/5">
<span class="font-headline text-xs font-bold text-on-surface-variant uppercase tracking-widest">GOAL: 20</span>
</div>
</div>
</div>
</section>
<!-- Dynamic Controls -->
<div class="w-full max-w-md space-y-6">
<!-- Manual Rep Entry - Material 3 Tonal Standard -->
<div class="grid gap-4 grid-cols-3">
<button class="h-24 bg-on-primary-fixed-variant/20 rounded-xl flex flex-col items-center justify-center active:scale-95 transition-transform border border-primary-fixed/10 hover:bg-on-primary-fixed-variant/30 group">
<span class="font-headline text-3xl font-black text-primary-fixed group-active:scale-110 transition-transform">+1</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">REP</span>
</button>
<button class="h-24 bg-on-primary-fixed-variant/20 rounded-xl flex flex-col items-center justify-center active:scale-95 transition-transform border border-primary-fixed/10 hover:bg-on-primary-fixed-variant/30 group">
<span class="font-headline text-3xl font-black text-primary-fixed group-active:scale-110 transition-transform">+10</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">REPS</span>
</button>
<button class="h-24 bg-surface-container-high rounded-xl flex flex-col items-center justify-center active:scale-95 transition-transform border border-white/5 hover:bg-surface-bright group">
<span class="material-symbols-outlined text-3xl font-black text-white group-active:text-primary-fixed">edit</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">EDIT</span>
</button>
</div>
<!-- Accelerometer Toggle Module - Harmonized with Settings -->
<div class="bg-surface-container-low p-5 rounded-2xl flex items-center justify-between border border-white/5">
<div class="flex items-center gap-4">
<div class="w-14 h-14 rounded-xl bg-surface-container-high flex items-center justify-center text-primary-fixed">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">vibration</span>
</div>
<div>
<h3 class="font-headline text-sm font-bold uppercase tracking-tight text-white">ACCELEROMETER MODE</h3>
<p class="font-body text-xs text-on-surface-variant">Auto-detecting squat depth</p>
</div>
</div>
<!-- Standard M3 Style Switch -->
<button class="relative inline-flex h-8 w-14 items-center rounded-full bg-primary-fixed transition-colors focus:outline-none">
<span class="translate-x-7 inline-block h-6 w-6 transform rounded-full bg-on-primary shadow-lg transition-transform"></span>
</button>
</div>
</div>
</main>
<!-- Fixed CTA Area -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface to-transparent">
<button class="w-full h-16 bg-primary-fixed text-on-primary rounded-xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all shadow-[0_8px_20px_rgba(204,255,0,0.25)] hover:shadow-[0_8px_25px_rgba(204,255,0,0.4)]">
<span class="font-headline text-lg font-black tracking-tighter uppercase">DONE</span>
<span class="material-symbols-outlined font-black" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</body></html>
