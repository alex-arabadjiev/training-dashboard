<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#abd600",
              "surface-container-low": "#1c1b1b",
              "on-tertiary-fixed": "#0b1d29",
              "tertiary-fixed": "#d2e5f5",
              "inverse-surface": "#e5e2e1",
              "tertiary-fixed-dim": "#b6c9d8",
              "on-tertiary": "#21323e",
              "on-secondary-container": "#00616d",
              "surface-container-high": "#2a2a2a",
              "on-surface-variant": "#c4c9ac",
              "surface-tint": "#abd600",
              "primary": "#ffffff",
              "on-primary": "#283500",
              "on-background": "#e5e2e1",
              "on-tertiary-container": "#556774",
              "surface-container": "#201f1f",
              "on-secondary-fixed-variant": "#004f58",
              "surface-dim": "#131313",
              "outline-variant": "#444933",
              "surface-container-highest": "#353534",
              "background": "#131313",
              "secondary-fixed": "#9cf0ff",
              "secondary-fixed-dim": "#00daf3",
              "primary-container": "#c3f400",
              "on-surface": "#e5e2e1",
              "error": "#ffb4ab",
              "inverse-on-surface": "#313030",
              "error-container": "#93000a",
              "on-error": "#690005",
              "tertiary": "#ffffff",
              "outline": "#8e9379",
              "surface-container-lowest": "#0e0e0e",
              "on-primary-container": "#556d00",
              "surface-bright": "#393939",
              "on-tertiary-fixed-variant": "#374956",
              "secondary-container": "#00e3fd",
              "on-secondary": "#00363d",
              "on-primary-fixed-variant": "#3c4d00",
              "surface": "#131313",
              "on-secondary-fixed": "#001f24",
              "tertiary-container": "#d2e5f5",
              "surface-variant": "#353534",
              "on-primary-fixed": "#161e00",
              "secondary": "#bdf4ff",
              "primary-fixed": "#c3f400",
              "inverse-primary": "#506600",
              "on-error-container": "#ffdad6"
            },
            fontFamily: {
              "headline": ["Lexend"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-gradient {
            background: linear-gradient(45deg, #abd600, #c3f400);
        }
        .glass-panel {
            background: rgba(53, 53, 52, 0.6);
            backdrop-filter: blur(12px);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<header class="bg-[#131313] flex justify-between items-center w-full px-6 py-6 fixed top-0 z-50">
<div class="flex items-center gap-3">
<h1 class="font-['Lexend'] font-black tracking-tighter uppercase italic text-2xl text-[#CCFF00]">KINETIC</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-neutral-800/50 transition-colors">
<span class="material-symbols-outlined text-neutral-500" data-icon="settings">settings</span>
</button>
</header>
<main class="pt-24 pb-12 px-6 max-w-2xl mx-auto space-y-10">
<!-- Header Section -->
<section class="space-y-4">
<div>
<span class="inline-block bg-[#1a1c00] text-[#CCFF00] px-4 py-1.5 rounded-full text-[10px] font-black font-headline tracking-[0.15em] uppercase border border-[#CCFF00]/20">STREAK: 14 DAYS</span>
</div>
<div class="space-y-0">
<div class="flex items-end justify-between">
<h2 class="font-headline font-black text-7xl italic tracking-tighter leading-none text-white whitespace-nowrap">DAY 15</h2>
<div class="text-right pb-1">
<p class="font-headline font-black text-2xl text-[#CCFF00] tracking-tighter leading-none">0%</p>
<p class="text-neutral-500 font-bold text-[8px] uppercase tracking-widest mt-1">TOTAL PROGRESS</p>
</div>
</div>
</div>
</section>
<!-- Exercise Cards Stack -->
<section class="space-y-4">
<h3 class="font-headline font-bold text-lg tracking-widest text-on-surface-variant uppercase mb-4 italic">TODAY'S GOALS</h3>
<div class="flex flex-col gap-4">
<!-- Push-ups Card (Incomplete) -->
<div class="bg-[#1A1A1A] p-6 rounded-md flex justify-between items-center border border-white/5">
<div class="flex items-center gap-6">
<div class="w-14 h-14 bg-black flex items-center justify-center rounded-md border border-white/10">
<span class="material-symbols-outlined text-[#CCFF00] text-3xl" data-icon="fitness_center">fitness_center</span>
</div>
<div>
<h4 class="font-headline font-black text-2xl tracking-tight italic uppercase text-white">Push-ups</h4>
<div class="flex flex-col gap-2 mt-1">
<p class="font-body text-[#CCFF00] font-bold text-sm">0/15 REPS</p>
<div class="h-1 w-32 bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-[#CCFF00] w-0 rounded-full"></div>
</div>
</div>
</div>
</div>
<div class="w-12 h-12 bg-transparent flex items-center justify-center rounded-md border border-white/10">
<!-- No check icon for incomplete state -->
</div>
</div>
<!-- Sit-ups Card (Incomplete) -->
<div class="bg-[#1A1A1A] p-6 rounded-md flex justify-between items-center border border-white/5">
<div class="flex items-center gap-6">
<div class="w-14 h-14 bg-black flex items-center justify-center rounded-md border border-white/10">
<span class="material-symbols-outlined text-[#CCFF00] text-3xl" data-icon="exercise">exercise</span>
</div>
<div>
<h4 class="font-headline font-black text-2xl tracking-tight italic uppercase text-white">Sit-ups</h4>
<div class="flex flex-col gap-2 mt-1">
<p class="font-body text-[#CCFF00] font-bold text-sm">0/30 REPS</p>
<div class="h-1 w-32 bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-[#CCFF00] w-0 rounded-full"></div>
</div>
</div>
</div>
</div>
<div class="w-12 h-12 bg-transparent flex items-center justify-center rounded-md border border-white/10">
<!-- No check icon for incomplete state -->
</div>
</div>
<!-- Squats Card (Incomplete) -->
<div class="bg-[#1A1A1A] p-6 rounded-md flex justify-between items-center border border-white/5">
<div class="flex items-center gap-6">
<div class="w-14 h-14 bg-black flex items-center justify-center rounded-md border border-white/10">
<span class="material-symbols-outlined text-[#CCFF00] text-3xl" data-icon="accessibility_new">accessibility_new</span>
</div>
<div>
<h4 class="font-headline font-black text-2xl tracking-tight italic uppercase text-white">Squats</h4>
<div class="flex flex-col gap-2 mt-1">
<p class="font-body text-[#CCFF00] font-bold text-sm mt-1">0/45 REPS</p>
<div class="h-1 w-32 bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-[#CCFF00] w-0 rounded-full"></div>
</div>
</div>
</div>
</div>
<div class="w-12 h-12 bg-transparent flex items-center justify-center rounded-md border border-white/10">
<!-- No check icon for incomplete state -->
</div>
</div>
</div>
</section>
<!-- Motivational Quote Section -->
<section>
<div class="bg-[#1A1A1A] p-8 rounded-md border border-white/5 relative overflow-hidden group">
<!-- Background Decorative Element -->
<div class="absolute -right-4 -bottom-4 opacity-[0.05] group-hover:opacity-[0.1] transition-opacity duration-700 pointer-events-none">
<span class="font-headline font-black text-9xl italic tracking-tighter uppercase leading-none text-[#CCFF00]">WIN</span>
</div>
<div class="relative z-10 flex flex-col items-center text-center space-y-4">
<div class="w-12 h-px bg-[#CCFF00]/30 mb-2"></div>
<h4 class="font-headline font-black text-4xl italic tracking-tighter leading-[0.9] text-white uppercase">
                    PRECISION <br/>
<span class="text-[#CCFF00]">IN EVERY REP</span>
</h4>
<p class="font-headline font-bold text-[10px] text-on-surface-variant uppercase tracking-[0.4em]">EXCELLENCE IS A HABIT</p>
<div class="w-12 h-px bg-[#CCFF00]/30 mt-2"></div>
</div>
</div>
</section>
</main>
<!-- Visual Texture Layer -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay overflow-hidden">
<svg viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<filter id="noiseFilter">
<feturbulence basefrequency="0.65" numoctaves="3" stitchtiles="stitch" type="fractalNoise"></feturbulence>
</filter>
<rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
</svg>
</div>
</body></html>
